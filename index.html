<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LiveAmo — Videollamada</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: #0a0a0f;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow-y: auto;
    padding: 16px 0;
  }

  /* Fondo animado */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(255,0,128,0.07) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(120,0,255,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .phone {
    width: 375px;
    height: 700px;
    position: relative;
    overflow: hidden;
    border-radius: 36px;
    background: #000;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 40px 80px rgba(0,0,0,0.8),
      0 0 60px rgba(255,0,128,0.12);
    flex-shrink: 0;
  }

  @media (max-height: 750px) {
    .phone {
      transform: scale(0.85);
      transform-origin: top center;
      margin-bottom: -105px;
    }
  }

  @media (max-height: 640px) {
    .phone {
      transform: scale(0.72);
      transform-origin: top center;
      margin-bottom: -196px;
    }
  }

  .bg-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Gradiente inferior */
  .gradient-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 55%;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* Gradiente superior */
  .gradient-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 30%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
    z-index: 2;
    pointer-events: none;
  }

  /* Header info */
  .header {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 110px;
    z-index: 5;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,0,80,0.9);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    animation: pulse-dot 1.2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .caller-name {
    color: white;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  }

  .call-duration {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    margin-top: 2px;
  }

  #descripcion {
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    margin-top: 4px;
  }

  /* Camara pequeña */
  .video-small {
    position: absolute;
    top: 50px;
    right: 16px;
    width: 88px;
    height: 120px;
    border-radius: 16px;
    border: 2px solid rgba(255,255,255,0.25);
    object-fit: cover;
    z-index: 5;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    background: #111;
  }

  /* Viewers */
  .viewers {
    position: absolute;
    top: 48px;
    right: 16px;
    width: 88px;
    text-align: center;
    color: rgba(255,255,255,0.7);
    font-size: 10px;
    z-index: 6;
    display: none;
  }

  /* Controles */
  /* ── BARRA DE CONTROLES ── */
  .controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 5;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 14px 10px 22px;
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.55) 70%, transparent 100%);
  }

  .btn-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s, opacity 0.15s;
  }

  .btn-group:active { transform: scale(0.9); opacity: 0.8; }

  .btn-icon {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-icon svg { display: block; }

  .btn-icon-glass {
    background: rgba(255,255,255,0.1);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.18);
  }

  .btn-icon-red {
    background: linear-gradient(135deg, #ff0060 0%, #ff3d7f 100%);
    box-shadow: 0 6px 20px rgba(255,0,96,0.45), 0 0 0 2px rgba(255,0,96,0.2);
  }

  .btn-icon-green {
    background: linear-gradient(135deg, #00c853 0%, #69f0ae 100%);
    box-shadow: 0 6px 20px rgba(0,200,83,0.35);
  }

  .btn-label {
    color: rgba(255,255,255,0.6);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* CHAT */
  #chatPanel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 360px;
    background: rgba(10,10,18,0.97);
    display: none;
    flex-direction: column;
    z-index: 15;
    border-radius: 24px 24px 0 0;
    border-top: 1px solid rgba(255,255,255,0.08);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    animation: slideUp 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes buscRing {
    0%   { transform: scale(0.85); opacity: 0; }
    50%  { opacity: 1; }
    100% { transform: scale(1.4);  opacity: 0; }
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .chat-handle {
    width: 36px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 10px auto 0;
  }

  .chat-header {
    padding: 10px 18px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .chat-title {
    color: white;
    font-size: 15px;
    font-weight: 600;
  }

  .chat-close {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    transition: background 0.15s;
  }

  .chat-close:hover { background: rgba(255,255,255,0.14); }

  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: none; /* Firefox */
    -ms-overflow-style: none; /* IE/Edge */
  }

  .chat-body::-webkit-scrollbar { display: none; } /* Chrome/Safari */

  .msg {
    max-width: 72%;
    padding: 9px 13px;
    border-radius: 18px;
    font-size: 13.5px;
    line-height: 1.4;
    word-break: break-word;
  }

  .tu {
    align-self: flex-end;
    background: linear-gradient(135deg, #ff0060, #ff4d8d);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .otro {
    align-self: flex-start;
    background: rgba(255,255,255,0.09);
    color: rgba(255,255,255,0.9);
    border-bottom-left-radius: 4px;
  }

  .typing-indicator {
    align-self: flex-start;
    background: rgba(255,255,255,0.09);
    padding: 10px 14px;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    display: none;
    gap: 4px;
    align-items: center;
  }

  .typing-dot {
    width: 6px;
    height: 6px;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    animation: typing 1.2s ease-in-out infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .chat-input {
    display: flex;
    padding: 10px 14px 18px;
    gap: 8px;
    align-items: center;
  }

  .chat-input input {
    flex: 1;
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    background: rgba(255,255,255,0.07);
    color: white;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input input::placeholder { color: rgba(255,255,255,0.3); }
  .chat-input input:focus { border-color: rgba(255,0,96,0.5); }

  .send-btn {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff0060, #ff4d8d);
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s;
    box-shadow: 0 2px 10px rgba(255,0,96,0.4);
  }

  .send-btn:active { transform: scale(0.9); }
</style>
</head>
<body>

<div class="phone">

  <video id="videoPrincipal" autoplay muted playsinline class="bg-video"></video>

  <div class="gradient-top"></div>
  <div class="gradient-bottom"></div>

  <!-- BUSCANDO PERSONA -->
  <div id="buscandoScreen" style="display:none;position:absolute;inset:0;z-index:40;background:#000;flex-direction:column;align-items:center;justify-content:center;border-radius:36px;">
    <div style="position:relative;width:90px;height:90px;margin-bottom:28px">
      <div style="position:absolute;inset:0;border-radius:50%;border:3px solid rgba(255,0,96,0.15);animation:buscRing 1.8s linear infinite"></div>
      <div style="position:absolute;inset:8px;border-radius:50%;border:3px solid rgba(255,0,96,0.25);animation:buscRing 1.8s linear infinite 0.3s"></div>
      <div style="position:absolute;inset:16px;border-radius:50%;border:3px solid rgba(255,0,96,0.4);animation:buscRing 1.8s linear infinite 0.6s"></div>
      <div style="position:absolute;inset:24px;background:linear-gradient(135deg,#ff0060,#ff4d8d);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;">👤</div>
    </div>
    <div style="color:white;font-size:17px;font-weight:700;margin-bottom:8px">Buscando persona...</div>
    <div style="color:rgba(255,255,255,0.35);font-size:13px;margin-bottom:28px" id="buscandoDots">Conectando</div>
    <button onclick="cancelarBusqueda()" style="padding:11px 28px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:30px;color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;">Cancelar</button>
  </div>

  <!-- CORTE — usuarios sin Pro -->
  <div id="corteScreen" style="display:none;position:absolute;inset:0;z-index:45;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:36px;border-radius:36px;">
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.96) 0%,rgba(0,0,0,0.6) 55%,transparent 100%);border-radius:36px;pointer-events:none"></div>
    <div style="position:relative;z-index:1;text-align:center;width:100%">
      <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,0,96,0.15);border:1px solid rgba(255,0,96,0.3);border-radius:20px;padding:5px 14px;font-size:12px;color:#ff4d8d;font-weight:700;margin-bottom:14px;letter-spacing:0.5px;">
        ⏸ Vista previa terminada
      </div>
      <div style="font-size:21px;font-weight:800;color:white;margin-bottom:8px;line-height:1.3">Desbloquea acceso<br>completo</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.45);margin-bottom:22px;line-height:1.6">
        Solo puedes ver <strong style="color:rgba(255,255,255,0.7)">30 segundos</strong> por video.<br>
        Activa Pro y ve sin límites.
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;padding:0 20px">
        <button onclick="window.location.href='pago.html'" style="padding:15px;background:linear-gradient(135deg,#ff0060,#ff4d8d);border:none;border-radius:14px;color:white;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(255,0,96,0.45);letter-spacing:0.3px;">
          💎 Activar Pro — $1.00
        </button>
        <button id="btnContinuarCorte" onclick="cerrarCorte()" style="padding:11px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;color:rgba(255,255,255,0.4);font-size:13px;cursor:pointer;">
          Continuar con límites
        </button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="live-badge">
      <span class="live-dot"></span>
      En vivo
    </div>
    <div class="caller-name" id="callerName">Liveamo</div>
    <div class="call-duration" id="callTimer">00:00</div>
    <div id="descripcion"></div>
  </div>

  <!-- Menú usuario -->
  <div id="userMenu" style="display:none;position:absolute;top:20px;right:16px;z-index:20;text-align:right;">
    <div onclick="toggleUserMenu()" style="cursor:pointer;display:flex;align-items:center;justify-content:flex-end;gap:7px;">
      <div style="background:linear-gradient(135deg,#ff0060,#ff4d8d);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:white;box-shadow:0 3px 10px rgba(255,0,96,0.4)" id="userAvatar">?</div>
    </div>
    <div id="userDropdown" style="display:none;margin-top:8px;background:rgba(15,15,25,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:10px;min-width:160px;box-shadow:0 10px 30px rgba(0,0,0,0.6);">
      <div id="userNameDisplay" style="font-size:13px;font-weight:600;color:white;padding:6px 8px 10px;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:6px;"></div>
      <div onclick="cerrarSesion()" style="padding:8px;border-radius:8px;font-size:13px;color:rgba(255,100,100,0.9);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.15s;" onmouseover="this.style.background='rgba(255,60,60,0.1)'" onmouseout="this.style.background='transparent'">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Cerrar sesión
      </div>
    </div>
  </div>

  <!-- Camara pequeña -->
  <video id="camara" class="video-small" autoplay playsinline muted></video>

  <!-- Controles -->
  <div class="controls">

    <!-- Micrófono -->
    <div class="btn-group" onclick="toggleMic()" id="micGroup">
      <div class="btn-icon btn-icon-glass" id="micBtn">
        <svg id="micSvg" width="24" height="24" fill="none" viewBox="0 0 24 24">
          <rect x="9" y="2" width="6" height="12" rx="3" fill="white"/>
          <path d="M5 11a7 7 0 0 0 14 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="18" x2="12" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="22" x2="15" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="btn-label" id="micLabel">Silencio</span>
    </div>

    <!-- Cambiar video -->
    <div class="btn-group" onclick="cambiarVideo()">
      <div class="btn-icon btn-icon-glass">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24">
          <path d="M1 4v6h6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M23 20v-6h-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="btn-label">Siguiente</span>
    </div>

    <!-- Premium -->
    <div class="btn-group" id="btnPremium" onclick="window.location.href='pago.html'">
      <div class="btn-icon btn-icon-red">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24">
          <path d="M12 2l2.9 6.26L22 9.27l-5 4.73 1.18 6.9L12 17.77l-6.18 3.13L7 14.0 2 9.27l7.1-1.01L12 2z" fill="white"/>
        </svg>
      </div>
      <span class="btn-label" style="color:rgba(255,140,140,1)">Premium</span>
    </div>

    <!-- Chat -->
    <div class="btn-group" onclick="abrirChat()">
      <div class="btn-icon btn-icon-glass">
        <svg width="24" height="24" fill="none" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="btn-label">Chat</span>
    </div>

  </div>

  <!-- Chat Panel -->
  <div id="chatPanel">
    <div class="chat-handle"></div>
    <div class="chat-header">
      <span class="chat-title">💬 Chat en vivo</span>
      <div class="chat-close" onclick="cerrarChat()">✕</div>
    </div>
    <div id="mensajes" class="chat-body">
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
    <div class="chat-input">
      <input id="inputMensaje" placeholder="Escribe un mensaje..." onkeydown="if(event.key==='Enter')enviarMensaje()">
      <button type="button" class="send-btn" onclick="enviarMensaje()">➤</button>
    </div>
  </div>

</div>

<script>
// ================================================================
// VARIABLES GLOBALES — todas declaradas al inicio para evitar TDZ
// ================================================================
const VIDEOS_GRATIS  = 20;
const DURACION_GRATIS = 30000;  // 30s
const DURACION_PRO    = 60000;  // 1 min
const LIMITE_PRO      = 100;    // videos por sesión Pro

let videos      = [];
let videoIndex  = 0;
let _timer      = null;
let _yaCorte    = false;
let _sinGratis  = false;
let _timerStart = Date.now();
let _buscandoTimer = null;
let _dotsTimer     = null;

// ================================================================
// SESIÓN
// ================================================================
(function() {
  try {
    const s = JSON.parse(localStorage.getItem('liveamo_session') || 'null');
    if (!s || Date.now() - s.ts > 30 * 24 * 60 * 60 * 1000) {
      window.location.href = "login.html"; return;
    }
    const menu   = document.getElementById("userMenu");
    const avatar = document.getElementById("userAvatar");
    const nameEl = document.getElementById("userNameDisplay");
    if (menu)   menu.style.display = "block";
    if (avatar) avatar.textContent = (s.name || s.email || "U")[0].toUpperCase();
    if (nameEl) nameEl.textContent = s.name || s.email;
  } catch(e) { window.location.href = "login.html"; }
})();

function toggleUserMenu() {
  const d = document.getElementById("userDropdown");
  d.style.display = d.style.display === "none" ? "block" : "none";
}

document.addEventListener("click", function(e) {
  const menu = document.getElementById("userMenu");
  if (menu && !menu.contains(e.target)) {
    const d = document.getElementById("userDropdown");
    if (d) d.style.display = "none";
  }
});

function cerrarSesion() {
  localStorage.removeItem('liveamo_session');
  window.location.href = "login.html";
}

// ================================================================
// PRO
// ================================================================
function esPro() {
  const pro = localStorage.getItem('liveamo_pro');
  const exp = parseInt(localStorage.getItem('liveamo_pro_exp') || '0');
  return pro === 'true' && Date.now() < exp;
}

// ================================================================
// VIDEOS
// ================================================================

async function cargarVideosNube() {
  document.getElementById("buscandoScreen").style.display = "flex";
  document.getElementById("buscandoDots").textContent = "Conectando...";
  try {
    const res    = await fetch('/api/videos');
    const lista  = await res.json();
    const validos = lista.filter(v => v.src && v.src.trim() !== '');
    if (validos.length) {
      ocultarBuscando();
      videos     = validos;
      videoIndex = 0;
      cargarVideo();
    } else {
      document.getElementById("buscandoDots").textContent = "Sin videos disponibles";
      setTimeout(cargarVideosNube, 8000);
    }
  } catch(e) {
    document.getElementById("buscandoDots").textContent = "Reintentando...";
    setTimeout(cargarVideosNube, 5000);
  }
}

function cargarVideo() {
  if (!videos.length) { mostrarBuscando(null); return; }
  const v  = videos[videoIndex];
  const el = document.getElementById("videoPrincipal");
  el.src = v.src;
  el.load();
  el.play().catch(function(){});
  document.getElementById("descripcion").innerText  = v.desc || '';
  document.getElementById("callerName").innerText   = v.name || 'LiveAmo';
  document.getElementById("corteScreen").style.display = "none";
  resetCronometro();
  arrancarTimer();
}

function cambiarVideo() {
  videoIndex = (videoIndex + 1) % Math.max(videos.length, 1);
  cargarVideo();
  if (!esPro()) registrarVista();
}

// ================================================================
// CRONÓMETRO DE LLAMADA
// ================================================================
function resetCronometro() {
  _timerStart = Date.now();
  document.getElementById("callTimer").textContent = "00:00";
}

setInterval(function() {
  const elapsed = Math.floor((Date.now() - _timerStart) / 1000);
  const m = Math.floor(elapsed / 60).toString().padStart(2,'0');
  const s = (elapsed % 60).toString().padStart(2,'0');
  document.getElementById("callTimer").textContent = m + ':' + s;
}, 500);

// ================================================================
// TIMER PRINCIPAL (30s gratis / 60s Pro)
// ================================================================
function arrancarTimer() {
  clearTimeout(_timer);
  _yaCorte = false;

  if (esPro()) {
    _timer = setTimeout(function() {
      var vPro = parseInt(localStorage.getItem('liveamo_pro_vistas') || '0') + 1;
      if (vPro >= LIMITE_PRO) {
        localStorage.setItem('liveamo_pro_vistas', '0');
        mostrarBuscando(function() { videoIndex = 0; cargarVideo(); });
      } else {
        localStorage.setItem('liveamo_pro_vistas', String(vPro));
        videoIndex = (videoIndex + 1) % Math.max(videos.length, 1);
        cargarVideo();
      }
    }, DURACION_PRO);
  } else {
    _timer = setTimeout(function() {
      if (_yaCorte || _sinGratis) return;
      _yaCorte = true;
      document.getElementById("videoPrincipal").pause();
      mostrarCorte(false);
    }, DURACION_GRATIS);
  }
}

// ================================================================
// CORTE / PAYWALL
// ================================================================
function mostrarCorte(soloPromo) {
  const btn = document.getElementById("btnContinuarCorte");
  if (btn) btn.style.display = soloPromo ? "none" : "block";
  document.getElementById("corteScreen").style.display = "flex";
}

function cerrarCorte() {
  document.getElementById("corteScreen").style.display = "none";
  videoIndex = (videoIndex + 1) % Math.max(videos.length, 1);
  cargarVideo();
}

function registrarVista() {
  if (esPro()) return;
  let v = parseInt(localStorage.getItem('liveamo_vistas') || '0') + 1;
  localStorage.setItem('liveamo_vistas', String(v));
  if (v >= VIDEOS_GRATIS) {
    _sinGratis = true;
    clearTimeout(_timer);
    document.getElementById("videoPrincipal").pause();
    mostrarCorte(true);
  }
}

function actualizarBtnPremium() {
  const btn = document.getElementById("btnPremium");
  if (!btn) return;
  if (esPro()) { btn.style.display = "none"; _sinGratis = false; }
  else           btn.style.display = "flex";
}

// ================================================================
// BUSCANDO PERSONA
// ================================================================
function mostrarBuscando(onReanudar) {
  document.getElementById("buscandoScreen").style.display = "flex";
  clearInterval(_dotsTimer);
  clearTimeout(_buscandoTimer);
  let dots = 0;
  const txts = ["Buscando", "Buscando.", "Buscando..", "Buscando..."];
  _dotsTimer = setInterval(function() {
    dots = (dots + 1) % txts.length;
    const el = document.getElementById("buscandoDots");
    if (el) el.textContent = txts[dots];
  }, 500);

  if (typeof onReanudar === "function") {
    const espera = 4000 + Math.random() * 3000;
    _buscandoTimer = setTimeout(function() {
      ocultarBuscando();
      onReanudar();
    }, espera);
  }
}

function ocultarBuscando() {
  document.getElementById("buscandoScreen").style.display = "none";
  clearTimeout(_buscandoTimer);
  clearInterval(_dotsTimer);
  _buscandoTimer = null;
  _dotsTimer     = null;
}

function cancelarBusqueda() {
  ocultarBuscando();
  videoIndex = 0;
  cargarVideo();
}

// ================================================================
// MIC
// ================================================================
let micOn = true;
function toggleMic() {
  micOn = !micOn;
  const btn   = document.getElementById("micBtn");
  const label = document.getElementById("micLabel");
  btn.classList.toggle("btn-icon-glass", micOn);
  btn.classList.toggle("btn-icon-red",   !micOn);
  label.textContent = micOn ? "Silencio" : "Activar";
}

// ================================================================
// CHAT
// ================================================================
function abrirChat()  { document.getElementById("chatPanel").style.display = "flex"; }
function cerrarChat() { document.getElementById("chatPanel").style.display = "none"; }

const respuestas = [
  "Ok 😏","Dime más 😈","Me gusta eso 🔥","¿En serio? 😳",
  "Sigue escribiendo 💬","Estoy viendo 👀","Wow 😳","Jajaja 😂",
  "No pares 🔥","Cuéntame más 😈","Interesante 🤔","Eso me gusta 💕",
  "Claro que sí 😍","Qué rico 🔥","Me encantas 😘"
];

function enviarMensaje() {
  const input = document.getElementById("inputMensaje");
  const texto = input.value.trim();
  if (!texto) return;
  const contenedor = document.getElementById("mensajes");
  const indicator  = document.getElementById("typingIndicator");
  const msg = document.createElement("div");
  msg.className   = "msg tu";
  msg.textContent = texto;
  contenedor.insertBefore(msg, indicator);
  input.value = "";
  contenedor.scrollTop = contenedor.scrollHeight;
  indicator.style.display = "flex";
  contenedor.scrollTop = contenedor.scrollHeight;
  setTimeout(function() {
    indicator.style.display = "none";
    const res = document.createElement("div");
    res.className   = "msg otro";
    res.textContent = respuestas[Math.floor(Math.random() * respuestas.length)];
    contenedor.insertBefore(res, indicator);
    contenedor.scrollTop = contenedor.scrollHeight;
  }, 900 + Math.random() * 600);
}
